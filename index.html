<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ========================= -->
    <!-- BASIC META -->
    <!-- ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ========================= -->
    <!-- WEBSITE TITLE -->
    <!-- ========================= -->
    <title>
      Webcore Solutions | Software Development & IT Services
    </title>

    <!-- ========================= -->
    <!-- SEO META -->
    <!-- ========================= -->
    <meta
      name="description"
      content="Webcore Solutions delivers professional software development, web development, SEO, GEO, CMS development, graphics design, and IT consultation services across Europe, Dubai, UK, and Pakistan."
    />

    <meta
      name="keywords"
      content="Webcore Solutions, Software Development, Web Development, IT Consultation, SEO Services, GEO Services, CMS Development, Graphics Design, Dubai IT Company, UK Software Company, Pakistan Software House"
    />

    <meta name="author" content="Webcore Solutions" />

    <!-- ========================= -->
    <!-- FAVICONS -->
    <!-- ========================= -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Optional PWA Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/web-app-manifest-192x192.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/web-app-manifest-512x512.png"
    />

    <!-- ========================= -->
    <!-- THEME COLOR -->
    <!-- ========================= -->
    <meta name="theme-color" content="#0f172a" />

    <!-- ========================= -->
    <!-- OPEN GRAPH / SOCIAL SHARE -->
    <!-- ========================= -->
    <meta property="og:type" content="website" />

    <!-- IMPORTANT -->
    <!-- Replace with your real domain -->
    <meta property="og:url" content="https://www.webcoresolutions.com" />

    <meta
      property="og:title"
      content="Webcore Solutions | Software Services Across Europe, Dubai, UK & Pakistan"
    />

    <meta
      property="og:description"
      content="Professional IT consultation, software development, web development, SEO, GEO, CMS development, and graphics design services for modern businesses."
    />

    <!-- OG IMAGE -->
    <!-- Your image is already in public folder -->
    <meta
      property="og:image"
      content="https://www.webcoresolutions.com/og-image.webp"
    />

    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ========================= -->
    <!-- TWITTER / X PREVIEW -->
    <!-- ========================= -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Webcore Solutions | Modern Software & IT Services"
    />

    <meta
      name="twitter:description"
      content="Helping businesses grow with software development, web solutions, SEO, GEO, CMS systems, and creative digital services."
    />

    <meta
      name="twitter:image"
      content="https://www.webcoresolutions.com/og-image.webp"
    />

    <!-- ========================= -->
    <!-- PERFORMANCE -->
    <!-- ========================= -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ========================= -->
    <!-- CANONICAL URL -->
    <!-- ========================= -->
    <link
      rel="canonical"
      href="https://www.webcoresolutions.com"
    />
  </head>

  <body>
    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
