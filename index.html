<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ========================= -->
    <!-- BASIC META -->
    <!-- ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ========================= -->
    <!-- SEO TITLE -->
    <!-- ========================= -->
    <title>
      Webcore Solutions | Software Development & IT Services
    </title>

    <!-- ========================= -->
    <!-- SEO DESCRIPTION -->
    <!-- ========================= -->
    <meta
      name="description"
      content="Webcore Solutions provides professional software development, web development, SEO, GEO, CMS development, graphics design, and IT consultation services across Europe, Dubai, UK, and Pakistan."
    />

    <!-- ========================= -->
    <!-- SEO KEYWORDS -->
    <!-- ========================= -->
    <meta
      name="keywords"
      content="Webcore Solutions, Software Development, Web Development, SEO Services, GEO Services, CMS Development, Graphics Design, IT Consultation, Dubai Software Company, UK Web Development, Pakistan Software House"
    />

    <meta name="author" content="Webcore Solutions" />

    <!-- ========================= -->
    <!-- THEME COLOR -->
    <!-- ========================= -->
    <meta name="theme-color" content="#0f172a" />

    <!-- ========================= -->
    <!-- FAVICONS -->
    <!-- ========================= -->
    <link rel="icon" href="/favicon.ico" />

    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="/favicon-96x96.png"
    />

    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
    />

    <link rel="manifest" href="/site.webmanifest" />

    <!-- Optional PWA Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/web-app-manifest-192x192.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/web-app-manifest-512x512.png"
    />

    <!-- ========================= -->
    <!-- OPEN GRAPH (FACEBOOK / WHATSAPP / LINKEDIN) -->
    <!-- ========================= -->
    <meta property="og:type" content="website" />

    <!-- CHANGE THIS TO YOUR REAL DOMAIN -->
    <meta
      property="og:url"
      content="https://www.webcoresolutions.com"
    />

    <meta
      property="og:title"
      content="Webcore Solutions | Modern Software & IT Services"
    />

    <meta
      property="og:description"
      content="Professional software development, web development, SEO, GEO, CMS development, graphics design, and IT consultation services across Europe, Dubai, UK, and Pakistan."
    />

    <!-- IMPORTANT -->
    <!-- OG IMAGE MUST BE INSIDE PUBLIC FOLDER -->
    <!-- FILE NAME: public/og-image.jpg -->

    <meta
      property="og:image"
      content="https://www.webcoresolutions.com/og-image.jpg"
    />

    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ========================= -->
    <!-- TWITTER / X -->
    <!-- ========================= -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Webcore Solutions"
    />

    <meta
      name="twitter:description"
      content="Software development, web development, SEO, CMS development, graphics design, and IT consultation services."
    />

    <meta
      name="twitter:image"
      content="https://www.webcoresolutions.com/og-image.jpg"
    />

    <!-- ========================= -->
    <!-- CANONICAL URL -->
    <!-- ========================= -->
    <link
      rel="canonical"
      href="https://www.webcoresolutions.com"
    />
  </head>

  <body>
    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main React/Vite Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
