<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />

    <!-- Google Search Console verification — replace token after claiming property at search.google.com/search-console -->
    <meta name="google-site-verification" content="REPLACE_WITH_GSC_VERIFICATION_TOKEN" />
    <!-- Bing Webmaster verification — replace token after claiming property at bing.com/webmasters -->
    <meta name="msvalidate.01" content="REPLACE_WITH_BING_VERIFICATION_TOKEN" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Preconnect to speed up 3rd-party resources -->
    <link rel="preconnect" href="https://analytics.ahrefs.com" crossorigin />
    <link rel="dns-prefetch" href="https://analytics.ahrefs.com" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preload OG / social image to avoid render-blocking on bots -->
    <link rel="preload" as="image" href="/og-image.webp" type="image/webp" />

    <!-- Analytics (async, non-blocking) -->
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="9EtiVofqR4HT4BxVcr0yPw" async defer></script>
  </head>

  <body>
    <noscript>
      <style>
        #root [style*="opacity:0"] {
          opacity: 1 !important;
          transform: none !important;
        }
      </style>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
