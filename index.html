<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ========================= -->
    <!-- BASIC META -->
    <!-- ========================= -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <!-- ========================= -->
    <!-- SEO TITLE -->
    <!-- ========================= -->
    <title>
      Webcore Solutions | Software Services Across Europe, Dubai, UK & Pakistan
    </title>

    <!-- ========================= -->
    <!-- SEO DESCRIPTION -->
    <!-- ========================= -->
    <meta
      name="description"
      content="Professional IT consultation, software development, web development, SEO, GEO, CMS development, and graphics design services across Europe, Dubai, UK & Pakistan."
    />

    <!-- ========================= -->
    <!-- SEO KEYWORDS -->
    <!-- ========================= -->
    <meta
      name="keywords"
      content="Webcore Solutions, Software Development, Web Development, SEO Services, GEO Services, CMS Development, Graphics Design, IT Consultation"
    />

    <meta name="author" content="Webcore Solutions" />

    <!-- ========================= -->
    <!-- THEME COLOR -->
    <!-- ========================= -->
    <meta name="theme-color" content="#0f172a" />

    <!-- ========================= -->
    <!-- FAVICONS -->
    <!-- ========================= -->

    <!-- Main favicon -->
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.webcoreuae.com/favicon.ico"
    />

    <!-- PNG favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="https://www.webcoreuae.com/favicon-96x96.png"
    />

    <!-- Apple Icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://www.webcoreuae.com/apple-touch-icon.png"
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="https://www.webcoreuae.com/site.webmanifest"
    />

    <!-- ========================= -->
    <!-- OPEN GRAPH / SOCIAL SHARE -->
    <!-- ========================= -->
    <meta property="og:type" content="website" />

    <meta
      property="og:site_name"
      content="Webcore Solutions"
    />

    <meta
      property="og:title"
      content="Webcore Solutions | Software Services Across Europe, Dubai, UK & Pakistan"
    />

    <meta
      property="og:description"
      content="Professional IT consultation, software development, web development, SEO, GEO, CMS development, and graphics design services across Europe, Dubai, UK & Pakistan."
    />

    <meta
      property="og:url"
      content="https://www.webcoreuae.com"
    />

    <!-- OG IMAGE -->
    <meta
      property="og:image"
      content="https://www.webcoreuae.com/og-image.png"
    />

    <meta property="og:image:type" content="image/png" />

    <meta property="og:image:width" content="1200" />

    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="Webcore Solutions — Software Services Across Europe, Dubai, UK & Pakistan"
    />

    <!-- ========================= -->
    <!-- TWITTER / X -->
    <!-- ========================= -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:site"
      content="@webcoresolutions"
    />

    <meta
      name="twitter:title"
      content="Webcore Solutions | Software Services Across Europe, Dubai, UK & Pakistan"
    />

    <meta
      name="twitter:description"
      content="Professional IT consultation, software development, web development, SEO, GEO, CMS development, and graphics design services across Europe, Dubai, UK & Pakistan."
    />

    <meta
      name="twitter:image"
      content="https://www.webcoreuae.com/og-image.png"
    />

    <meta
      name="twitter:image:alt"
      content="Webcore Solutions — Software Services Across Europe, Dubai, UK & Pakistan"
    />

    <!-- ========================= -->
    <!-- CANONICAL URL -->
    <!-- ========================= -->
    <link
      rel="canonical"
      href="https://www.webcoreuae.com/"
    />
  </head>

  <body>
    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main React/Vite Entry -->
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
